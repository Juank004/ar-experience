<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AR · Juan Carlos Córdova</title>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{overflow:hidden;background:#000;font-family:'Inter',sans-serif;}

  /* Pantalla de inicio */
  #splash{
    position:fixed;inset:0;z-index:999;
    background:linear-gradient(160deg,#031c0c 0%,#0a3d1a 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
    padding:40px 32px;
  }
  #splash.hidden{display:none;}

  .splash-logo img{
    height:36px;width:auto;
    filter:brightness(0) invert(1);opacity:0.9;
  }
  .splash-title{
    font-size:22px;font-weight:700;color:#fff;
    text-align:center;letter-spacing:-0.3px;line-height:1.2;
  }
  .splash-sub{
    font-size:12px;color:rgba(255,255,255,0.45);
    text-align:center;letter-spacing:0.5px;line-height:1.6;max-width:280px;
  }

  .qr-preview{
    background:#fff;border-radius:16px;padding:14px;
    box-shadow:0 0 40px rgba(74,222,128,0.2);
  }
  .qr-preview img{width:160px;height:160px;display:block;border-radius:4px;}
  .qr-label{
    text-align:center;margin-top:10px;
    font-size:10px;font-weight:600;letter-spacing:2.5px;color:#4ade80;text-transform:uppercase;
  }

  .start-btn{
    background:linear-gradient(135deg,#0e6630,#1a9448);
    color:#fff;border:none;border-radius:50px;
    padding:16px 40px;font-size:15px;font-weight:700;
    letter-spacing:0.3px;cursor:pointer;width:100%;max-width:300px;
    box-shadow:0 6px 28px rgba(26,148,72,0.4);
    display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .start-btn svg{width:20px;height:20px;}

  /* HUD superpuesto sobre la cámara */
  #hud{
    position:fixed;inset:0;z-index:100;pointer-events:none;
  }

  /* Brackets del visor */
  .vb{position:absolute;width:30px;height:30px;}
  .vb.tl{top:20px;left:20px;border-top:3px solid rgba(74,222,128,0.7);border-left:3px solid rgba(74,222,128,0.7);border-radius:4px 0 0 0;}
  .vb.tr{top:20px;right:20px;border-top:3px solid rgba(74,222,128,0.7);border-right:3px solid rgba(74,222,128,0.7);border-radius:0 4px 0 0;}
  .vb.bl{bottom:20px;left:20px;border-bottom:3px solid rgba(74,222,128,0.7);border-left:3px solid rgba(74,222,128,0.7);border-radius:0 0 0 4px;}
  .vb.br{bottom:20px;right:20px;border-bottom:3px solid rgba(74,222,128,0.7);border-right:3px solid rgba(74,222,128,0.7);border-radius:0 0 4px 0;}

  /* Instrucción */
  .hud-hint{
    position:absolute;bottom:50px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);
    border:1px solid rgba(74,222,128,0.25);border-radius:50px;
    padding:10px 22px;font-size:12px;font-weight:600;
    color:rgba(255,255,255,0.8);letter-spacing:0.5px;white-space:nowrap;
    pointer-events:auto;
  }
  .hud-hint.found{color:#4ade80;border-color:rgba(74,222,128,0.6);}

  /* Botón cerrar */
  .hud-close{
    position:absolute;top:20px;right:20px;
    width:40px;height:40px;border-radius:50%;
    background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);
    color:#fff;font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    pointer-events:auto;
  }

  /* Scan line animada */
  .scan-line{
    position:absolute;left:15%;right:15%;height:2px;
    background:linear-gradient(90deg,transparent,rgba(74,222,128,0.8),transparent);
    animation:scanv 2.5s ease-in-out infinite;top:30%;
  }
  @keyframes scanv{
    0%{top:20%;opacity:0} 10%{opacity:1}
    90%{opacity:1} 100%{top:80%;opacity:0}
  }

  /* A-Frame canvas ocupa todo */
  a-scene{
    position:fixed!important;inset:0;
    width:100%!important;height:100%!important;
  }
</style>
</head>

  <div class="vb tl"></div><div class="vb tr"></div>
  <div class="vb bl"></div><div class="vb br"></div>

  <div class="hud-close" id="closeBtn">✕</div>
</div>

<!-- ESCENA AR -->
<a-scene id="arScene"
  style="display:none"
  mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <a-asset-item id="avatarModel" src="JCC.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <!-- Modelo 3D flotando sobre la tarjeta -->
    <a-gltf-model
      src="#avatarModel"
      position="0 0.4 0"
      scale="0.35 0.35 0.35"
      rotation="0 0 0"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
    ></a-gltf-model>

    <!-- Plataforma circular debajo del modelo -->
    <a-circle
      position="0 0.01 0"
      rotation="-90 0 0"
      radius="0.18"
      color="#0e6630"
      opacity="0.4"
    ></a-circle>
    <a-ring
      position="0 0.02 0"
      rotation="-90 0 0"
      radius-inner="0.17"
      radius-outer="0.19"
      color="#4ade80"
      opacity="0.8"
      animation="property: rotation; to: -90 0 360; loop: true; dur: 4000; easing: linear"
    ></a-ring>

    <!-- Nombre flotante -->
    <a-text
      value="Juan Carlos Córdova"
      position="0 0.85 0"
      align="center"
      color="#ffffff"
      width="1.2"
      font="https://cdn.jsdelivr.net/npm/aframe@1.4.2/examples/fonts/mozillavr.fnt"
    ></a-text>
    <a-text
      value="Baker Hughes"
      position="0 0.73 0"
      align="center"
      color="#4ade80"
      width="0.9"
      font="https://cdn.jsdelivr.net/npm/aframe@1.4.2/examples/fonts/mozillavr.fnt"
    ></a-text>
  </a-entity>

</a-scene>

<script>
  const splash = document.getElementById('splash');
  const hud = document.getElementById('hud');
  const arScene = document.getElementById('arScene');
  const startBtn = document.getElementById('startBtn');
  const hintText = document.getElementById('hintText');
  const scanLine = document.getElementById('scanLine');
  const closeBtn = document.getElementById('closeBtn');

  startBtn.addEventListener('click', () => {
    splash.classList.add('hidden');
    arScene.style.display = 'block';
    hud.style.display = 'block';

    arScene.addEventListener('loaded', () => {
      const sys = arScene.systems['mindar-image-system'];
      if (sys) sys.start();
    });
  });

  // Detectar cuando encuentra el target
  arScene.addEventListener('targetFound', () => {
    hintText.textContent = '✓ Tarjeta detectada';
    hintText.classList.add('found');
    scanLine.style.display = 'none';
  });

  arScene.addEventListener('targetLost', () => {
    hintText.textContent = 'Apunta a la tarjeta física';
    hintText.classList.remove('found');
    scanLine.style.display = 'block';
  });

  closeBtn.addEventListener('click', () => {
    const sys = arScene.systems['mindar-image-system'];
    if (sys) sys.stop();
    arScene.style.display = 'none';
    hud.style.display = 'none';
    splash.classList.remove('hidden');
  });
</script>
</body>
